<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}SCADA Dashboard{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0b0f1a;
    --surface:   #111827;
    --surface2:  #1a2235;
    --border:    #1e2d45;
    --accent:    #2563eb;
    --accent2:   #3b82f6;
    --text:      #f1f5f9;
    --sub:       #94a3b8;
    --success:   #10b981;
    --danger:    #ef4444;
    --warn:      #f59e0b;
    --card-glow: 0 0 0 1px rgba(37,99,235,.18), 0 8px 32px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

  /* ── flash messages ── */
  .flash-box{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
  .flash{padding:14px 20px;border-radius:10px;font-weight:600;font-size:14px;
         animation:slideIn .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.4)}
  .flash.success{background:#064e3b;border:1px solid #10b981;color:#6ee7b7}
  .flash.danger{background:#450a0a;border:1px solid #ef4444;color:#fca5a5}
  .flash.info{background:#1e3a5f;border:1px solid #3b82f6;color:#93c5fd}
  .flash.warning{background:#451a03;border:1px solid #f59e0b;color:#fcd34d}
  @keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}

  /* ── buttons ── */
  .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border:none;
       border-radius:8px;font-weight:600;font-size:14px;cursor:pointer;transition:all .2s}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:#1d4ed8;transform:translateY(-1px)}
  .btn-danger{background:#7f1d1d;color:#fca5a5;border:1px solid #ef4444}
  .btn-danger:hover{background:#991b1b}
  .btn-ghost{background:transparent;color:var(--sub);border:1px solid var(--border)}
  .btn-ghost:hover{background:var(--surface2);color:var(--text)}
  .btn-sm{padding:6px 14px;font-size:13px}

  /* ── form controls ── */
  .form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
  .form-group label{font-size:13px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.05em}
  .form-control{background:var(--bg);border:1px solid var(--border);color:var(--text);
                padding:10px 14px;border-radius:8px;font-size:14px;font-family:inherit;
                transition:border .2s}
  .form-control:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.15)}
  select.form-control option{background:var(--surface)}

  /* ── modal ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:8000;
                 display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;
         padding:32px;width:100%;max-width:480px;box-shadow:var(--card-glow)}
  .modal h3{font-size:20px;font-weight:700;margin-bottom:24px}

  /* ── tables ── */
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{text-align:left;padding:12px 16px;background:var(--surface2);color:var(--sub);
     font-size:12px;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border)}
  td{padding:12px 16px;border-bottom:1px solid var(--border)}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(37,99,235,.04)}

  /* ── badge ── */
  .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;
         font-size:12px;font-weight:600}
  .badge-success{background:#064e3b;color:#6ee7b7}
  .badge-danger{background:#450a0a;color:#fca5a5}
  .badge-admin{background:#1e1b4b;color:#a5b4fc}
  .badge-user{background:#1c2c40;color:#93c5fd}

  /* ── scrollbar ── */
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
{% block extra_head %}{% endblock %}
</head>
<body>

<!-- Flash messages -->
<div class="flash-box">
{% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
  <div class="flash {{ cat }}">{{ msg }}</div>
  {% endfor %}
{% endwith %}
</div>

{% block body %}{% endblock %}

<script>
// auto-dismiss flash messages
document.querySelectorAll('.flash').forEach(el => {
  setTimeout(() => el.style.opacity='0', 4000);
  setTimeout(() => el.remove(), 4500);
});

// modal helpers
function openModal(id){ document.getElementById(id).classList.add('open') }
function closeModal(id){ document.getElementById(id).classList.remove('open') }
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if(e.target===m) m.classList.remove('open') });
});
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
