{% extends "base.html" %}
{% block title %}Verify OTP – SCADA Dashboard{% endblock %}
{% block extra_head %}
<style>
body{display:flex;align-items:center;justify-content:center;
     background:radial-gradient(ellipse at 40% 60%, #0d1b3e 0%, #0b0f1a 60%)}
.wrap{width:100%;max-width:420px;padding:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;
      padding:36px;box-shadow:var(--card-glow)}
.card h2{font-size:22px;font-weight:700;margin-bottom:6px}
.card p{color:var(--sub);font-size:14px;margin-bottom:28px}
.otp-input{letter-spacing:16px;font-size:28px;font-weight:700;text-align:center;
           background:var(--bg);border:2px solid var(--accent);padding:16px;border-radius:12px}
.email-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(37,99,235,.1);
             border:1px solid rgba(37,99,235,.3);border-radius:8px;padding:8px 14px;
             font-size:13px;color:var(--accent2);font-weight:600;margin-bottom:24px}
</style>
{% endblock %}
{% block body %}
<div class="wrap">
  <div class="card">
    <h2>✉️ Enter OTP</h2>
    <p>We sent a 6-digit code to:</p>
    <div class="email-badge">📧 {{ email }}</div>

    <form method="POST" action="{{ url_for('signup_verify') }}">
      <div class="form-group">
        <label>6-Digit OTP</label>
        <input class="form-control otp-input" type="text" name="otp"
               placeholder="______" maxlength="6" pattern="[0-9]{6}" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;margin-top:8px">
        Verify & Create Account ✓
      </button>
    </form>

    <p style="text-align:center;color:var(--sub);font-size:13px;margin-top:20px">
      Didn't get the OTP? Check your spam folder or
      <a href="{{ url_for('signup') }}" style="color:var(--accent2);font-weight:600">try again</a>.
    </p>
  </div>
</div>
{% endblock %}
